name: Release (Test)

on:
  push:
    tags:
      - 'test-v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build and release (test config)
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DocuMind-Test ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false
          args: --config src-tauri/tauri.test.conf.json

      - name: Upload signatures and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^test-v', ''
          $bundleDir = "src-tauri/target/release/bundle"

          # Find all .sig files
          $sigFiles = Get-ChildItem -Path $bundleDir -Recurse -Filter "*.sig"
          Write-Host "Found signature files:"
          $sigFiles | ForEach-Object { Write-Host "  $_" }

          if ($sigFiles.Count -eq 0) {
            Write-Host "::error::No .sig files found. Signing may have failed."
            exit 1
          }

          # Upload .sig files to the release
          foreach ($sig in $sigFiles) {
            Write-Host "Uploading $($sig.Name)..."
            gh release upload $tag $sig.FullName --repo ${{ github.repository }} --clobber
          }

          # Read signature content for NSIS installer
          $nsisSetupSig = $sigFiles | Where-Object { $_.Name -match "setup\.exe\.sig$" } | Select-Object -First 1
          $nsisSig = ""
          if ($nsisSetupSig) {
            $nsisSig = Get-Content $nsisSetupSig.FullName -Raw
            $nsisSig = $nsisSig.Trim()
          }

          # Get download URLs from release assets
          $releaseJson = gh release view $tag --repo ${{ github.repository }} --json assets | ConvertFrom-Json
          $nsisUrl = ($releaseJson.assets | Where-Object { $_.name -match "setup\.exe$" }).url

          # Build latest.json
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $platforms = @{}

          if ($nsisUrl -and $nsisSig) {
            $platforms["windows-x86_64"] = @{
              signature = $nsisSig
              url = $nsisUrl
            }
          }

          $latestJson = @{
            version = $version
            notes = "DocuMind-Test $tag release"
            pub_date = $now
            platforms = $platforms
          } | ConvertTo-Json -Depth 4

          Write-Host "latest.json content:"
          Write-Host $latestJson

          # Save and upload latest.json to this release
          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          gh release upload $tag "latest.json" --repo ${{ github.repository }} --clobber

  update-manifest:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Copy latest.json to updater-manifest as latest-test.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Download latest.json from the version release
          gh release download "$TAG" --repo ${{ github.repository }} --pattern "latest.json" --output latest.json

          echo "Downloaded latest.json:"
          cat latest.json

          # Check if updater-manifest release exists
          if gh release view updater-manifest --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "updater-manifest release exists, uploading..."
          else
            echo "Creating updater-manifest release..."
            gh release create updater-manifest --repo ${{ github.repository }} \
              --title "Updater Manifests" \
              --notes "Auto-updated manifests for in-app updater. Do not delete." \
              --latest=false
          fi

          # Upload as latest-test.json (--clobber replaces existing)
          gh release upload updater-manifest latest.json --repo ${{ github.repository }} --clobber
          # Also upload as latest-test.json
          mv latest.json latest-test.json
          gh release upload updater-manifest latest-test.json --repo ${{ github.repository }} --clobber

          echo "Successfully uploaded latest-test.json to updater-manifest release"
