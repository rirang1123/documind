name: Release (Test)

on:
  push:
    tags:
      - 'test-v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build and release (test config)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DocuMind-Test ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          args: --config src-tauri/tauri.test.conf.json

  update-manifest:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Copy latest.json to updater-manifest as latest-test.json
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ github.ref_name }}'

            // 1. Find the release created by tauri-action
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10,
            })
            const thisRelease = releases.find(r => r.tag_name === tag)
            if (!thisRelease) {
              core.setFailed(`Release for tag ${tag} not found`)
              return
            }

            // 2. Download latest.json from the release
            const latestAsset = thisRelease.assets.find(a => a.name === 'latest.json')
            if (!latestAsset) {
              core.setFailed('latest.json not found in release assets')
              return
            }

            const resp = await github.request('GET ' + latestAsset.url, {
              headers: { Accept: 'application/octet-stream' }
            })
            const latestJson = Buffer.from(resp.data).toString('utf-8')
            core.info(`latest.json content: ${latestJson}`)

            // 3. Find or create "updater-manifest" release
            let manifestRelease = releases.find(r => r.tag_name === 'updater-manifest')

            if (!manifestRelease) {
              const { data: masterRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/master',
              })
              try {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/updater-manifest',
                  sha: masterRef.object.sha,
                })
              } catch { /* tag may exist */ }

              const { data: created } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'updater-manifest',
                name: 'Updater Manifests',
                body: 'Auto-updated manifests for in-app updater. Do not delete.',
                draft: false,
                prerelease: false,
              })
              manifestRelease = created
            }

            // 4. Upload latest-test.json (replace if exists)
            const existing = manifestRelease.assets?.find(a => a.name === 'latest-test.json')
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              })
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: manifestRelease.id,
              name: 'latest-test.json',
              data: latestJson,
            })

            core.info(`Uploaded latest-test.json to updater-manifest release`)
