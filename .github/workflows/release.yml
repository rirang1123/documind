name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          echo "=== Listing bundle directory ==="
          find "$BUNDLE_DIR" -type f | head -30

          echo ""
          echo "=== Looking for .sig files ==="
          SIG_FILES=$(find "$BUNDLE_DIR" -name "*.sig" -type f)
          echo "$SIG_FILES"

          if [ -z "$SIG_FILES" ]; then
            echo "::error::No .sig files found"
            exit 1
          fi

          # Find installer files
          NSIS_EXE=$(find "$BUNDLE_DIR/nsis" -name "*-setup.exe" ! -name "*.sig" | head -1)
          NSIS_SIG=$(find "$BUNDLE_DIR/nsis" -name "*-setup.exe.sig" | head -1)
          MSI_FILE=$(find "$BUNDLE_DIR/msi" -name "*.msi" ! -name "*.sig" | head -1)

          echo ""
          echo "NSIS: $NSIS_EXE"
          echo "NSIS sig: $NSIS_SIG"
          echo "MSI: $MSI_FILE"

          # Create GitHub release
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "DocuMind $TAG" \
            --notes "DocuMind $TAG release" \
            --latest

          # Upload installers
          [ -f "$NSIS_EXE" ] && gh release upload "$TAG" "$NSIS_EXE" --repo ${{ github.repository }}
          [ -f "$MSI_FILE" ] && gh release upload "$TAG" "$MSI_FILE" --repo ${{ github.repository }}

          # Upload .sig files
          for sig in $SIG_FILES; do
            echo "Uploading $(basename $sig)..."
            gh release upload "$TAG" "$sig" --repo ${{ github.repository }}
          done

          # Read NSIS signature
          NSIS_SIG_CONTENT=""
          if [ -f "$NSIS_SIG" ]; then
            NSIS_SIG_CONTENT=$(cat "$NSIS_SIG" | tr -d '\n\r')
          fi

          # Get download URL for NSIS installer
          NSIS_NAME=$(basename "$NSIS_EXE")
          NSIS_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${NSIS_NAME}"

          # Generate latest.json
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "DocuMind ${TAG} release",
            "pub_date": "${NOW}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG_CONTENT}",
                "url": "${NSIS_URL}"
              }
            }
          }
          ENDJSON

          echo ""
          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --repo ${{ github.repository }}

  update-manifest:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Copy latest.json to updater-manifest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Download latest.json from the version release
          gh release download "$TAG" --repo ${{ github.repository }} --pattern "latest.json" --output latest.json

          echo "Downloaded latest.json:"
          cat latest.json

          # Check if updater-manifest release exists
          if gh release view updater-manifest --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "updater-manifest release exists, uploading..."
          else
            echo "Creating updater-manifest release..."
            gh release create updater-manifest --repo ${{ github.repository }} \
              --title "Updater Manifests" \
              --notes "Auto-updated manifests for in-app updater. Do not delete." \
              --latest=false
          fi

          # Upload latest.json (--clobber replaces existing)
          gh release upload updater-manifest latest.json --repo ${{ github.repository }} --clobber

          echo "Successfully uploaded latest.json to updater-manifest release"
