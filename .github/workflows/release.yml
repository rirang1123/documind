name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Create release, upload artifacts, and update Pages
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const tag = process.env.TAG;
            const version = tag.replace(/^v/, '');
            const bundleDir = path.join(process.env.GITHUB_WORKSPACE, 'src-tauri', 'target', 'release', 'bundle');

            // Find files recursively
            function findFiles(dir, pattern) {
              const results = [];
              try {
                const items = fs.readdirSync(dir, { withFileTypes: true });
                for (const item of items) {
                  const fullPath = path.join(dir, item.name);
                  if (item.isDirectory()) {
                    results.push(...findFiles(fullPath, pattern));
                  } else if (pattern.test(item.name)) {
                    results.push(fullPath);
                  }
                }
              } catch {}
              return results;
            }

            const sigFiles = findFiles(bundleDir, /\.sig$/);
            core.info(`Found .sig files: ${JSON.stringify(sigFiles.map(f => path.basename(f)))}`);

            if (sigFiles.length === 0) {
              core.setFailed('No .sig files found');
              return;
            }

            const nsisExe = findFiles(path.join(bundleDir, 'nsis'), /setup\.exe$/)[0];
            const nsisSig = findFiles(path.join(bundleDir, 'nsis'), /setup\.exe\.sig$/)[0];
            const msiFile = findFiles(path.join(bundleDir, 'msi'), /\.msi$/)[0];

            core.info(`NSIS: ${nsisExe}`);
            core.info(`NSIS sig: ${nsisSig}`);
            core.info(`MSI: ${msiFile}`);

            // 1. Create release
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `DocuMind ${tag}`,
              body: `DocuMind ${tag} release`,
              draft: false,
              prerelease: false,
              make_latest: 'true',
            });
            core.info(`Created release: ${release.html_url}`);

            // 2. Upload assets
            async function uploadAsset(filePath) {
              const name = path.basename(filePath);
              const data = fs.readFileSync(filePath);
              core.info(`Uploading ${name} (${data.length} bytes)...`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name,
                data,
              });
            }

            if (nsisExe) await uploadAsset(nsisExe);
            if (msiFile) await uploadAsset(msiFile);
            for (const sig of sigFiles) await uploadAsset(sig);

            // 3. Generate latest.json
            const sigContent = fs.readFileSync(nsisSig, 'utf-8').trim();
            const nsisName = path.basename(nsisExe);
            const nsisUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${nsisName}`;
            const now = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');

            const latestJson = JSON.stringify({
              version,
              notes: `DocuMind ${tag} release`,
              pub_date: now,
              platforms: {
                'windows-x86_64': {
                  signature: sigContent,
                  url: nsisUrl,
                },
              },
            }, null, 2);

            core.info(`latest.json:\n${latestJson}`);

            // 4. Update latest.json on gh-pages branch
            let existingSha = null;
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'latest.json',
                ref: 'gh-pages',
              });
              existingSha = existing.sha;
            } catch {}

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'latest.json',
              message: `update latest.json for ${tag}`,
              content: Buffer.from(latestJson).toString('base64'),
              branch: 'gh-pages',
              ...(existingSha ? { sha: existingSha } : {}),
            });

            core.info('Updated latest.json on gh-pages');
