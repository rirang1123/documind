name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: DocuMind ${{ github.ref_name }}
          draft: true
          prerelease: false

  build-tauri:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })

  update-manifest:
    needs: [create-release, build-tauri, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json to updater-manifest release
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Build manifest from this release
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
            })

            const version = release.data.tag_name.replace('v', '')
            const notes = release.data.body || ''
            const pubDate = release.data.published_at

            const nsisAsset = release.data.assets.find(a => a.name.endsWith('-setup.exe'))
            const nsisSigAsset = release.data.assets.find(a => a.name.endsWith('-setup.exe.sig'))

            let nsisSig = ''
            if (nsisSigAsset) {
              const resp = await github.request('GET ' + nsisSigAsset.url, {
                headers: { Accept: 'application/octet-stream' }
              })
              nsisSig = Buffer.from(resp.data).toString('utf-8').trim()
            }

            const manifest = {
              version,
              notes,
              pub_date: pubDate,
              platforms: {}
            }

            if (nsisAsset && nsisSig) {
              manifest.platforms['windows-x86_64'] = {
                signature: nsisSig,
                url: nsisAsset.browser_download_url,
              }
            }

            // 2. Find or create "updater-manifest" release
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })
            let manifestRelease = releases.find(r => r.tag_name === 'updater-manifest')

            if (!manifestRelease) {
              // Create tag
              const { data: mainRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/master',
              })
              try {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/updater-manifest',
                  sha: mainRef.object.sha,
                })
              } catch { /* tag may exist */ }

              const { data: created } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'updater-manifest',
                name: 'Updater Manifests',
                body: 'Auto-updated manifests for in-app updater. Do not delete.',
                draft: false,
                prerelease: false,
              })
              manifestRelease = created
            }

            // 3. Upload latest.json (replace if exists)
            const existing = manifestRelease.assets?.find(a => a.name === 'latest.json')
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              })
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: manifestRelease.id,
              name: 'latest.json',
              data: JSON.stringify(manifest, null, 2),
            })

            core.info(`Uploaded latest.json v${version} to updater-manifest release`)
