name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: DocuMind ${{ github.ref_name }}
          draft: true
          prerelease: false

  build-tauri:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })

  update-manifest:
    needs: [create-release, build-tauri, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets info
        uses: actions/github-script@v7
        id: get-assets
        with:
          script: |
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
            })

            const version = release.data.tag_name.replace('v', '')
            const notes = release.data.body || ''
            const pubDate = release.data.published_at

            // Find NSIS setup and its signature
            const nsisAsset = release.data.assets.find(a => a.name.endsWith('-setup.exe'))
            const nsisSigAsset = release.data.assets.find(a => a.name.endsWith('-setup.exe.sig'))

            // Find MSI and its signature
            const msiAsset = release.data.assets.find(a => a.name.endsWith('.msi'))
            const msiSigAsset = release.data.assets.find(a => a.name.endsWith('.msi.sig'))

            // Download signature files content
            let nsisSig = ''
            let msiSig = ''

            if (nsisSigAsset) {
              const resp = await github.request('GET ' + nsisSigAsset.url, {
                headers: { Accept: 'application/octet-stream' }
              })
              nsisSig = Buffer.from(resp.data).toString('utf-8').trim()
            }

            if (msiSigAsset) {
              const resp = await github.request('GET ' + msiSigAsset.url, {
                headers: { Accept: 'application/octet-stream' }
              })
              msiSig = Buffer.from(resp.data).toString('utf-8').trim()
            }

            const manifest = {
              version,
              notes,
              pub_date: pubDate,
              platforms: {}
            }

            if (nsisAsset && nsisSig) {
              manifest.platforms['windows-x86_64'] = {
                signature: nsisSig,
                url: nsisAsset.browser_download_url,
              }
            }

            core.setOutput('manifest', JSON.stringify(manifest, null, 2))
            core.setOutput('version', version)

      - name: Create latest.json
        run: |
          echo '${{ steps.get-assets.outputs.manifest }}' > latest.json

      - name: Upload latest.json to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const content = fs.readFileSync('latest.json')

            // Delete existing latest.json if present
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
            })
            const existing = release.data.assets.find(a => a.name === 'latest.json')
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              })
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: 'latest.json',
              data: content,
            })
