<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8E5FF"/>
    </linearGradient>
    <linearGradient id="ai-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="inner-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Document shape (folded corner) -->
  <g filter="url(#shadow)">
    <path d="M310 200 L640 200 L740 300 L740 780 Q740 800 720 800 L330 800 Q310 800 310 780 Z" fill="url(#doc)"/>
    <!-- Folded corner -->
    <path d="M640 200 L640 280 Q640 300 660 300 L740 300 Z" fill="#C7D2FE" opacity="0.8"/>
  </g>

  <!-- Document lines -->
  <g opacity="0.2" stroke="#4F46E5" stroke-width="6" stroke-linecap="round">
    <line x1="380" y1="360" x2="670" y2="360"/>
    <line x1="380" y1="420" x2="650" y2="420"/>
    <line x1="380" y1="480" x2="580" y2="480"/>
    <line x1="380" y1="540" x2="620" y2="540"/>
    <line x1="380" y1="600" x2="550" y2="600"/>
  </g>

  <!-- AI brain/circuit node cluster (bottom-right overlay) -->
  <g filter="url(#inner-shadow)">
    <!-- Central circle -->
    <circle cx="680" cy="680" r="120" fill="url(#ai-glow)" opacity="0.95"/>

    <!-- Inner brain pattern -->
    <g stroke="#FFFFFF" stroke-width="3.5" fill="none" opacity="0.9">
      <!-- Neural connections -->
      <circle cx="680" cy="645" r="18"/>
      <circle cx="645" cy="695" r="14"/>
      <circle cx="715" cy="695" r="14"/>
      <circle cx="680" cy="720" r="10"/>

      <!-- Connection lines -->
      <line x1="680" y1="663" x2="654" y2="684"/>
      <line x1="680" y1="663" x2="706" y2="684"/>
      <line x1="655" y1="706" x2="674" y2="714"/>
      <line x1="705" y1="706" x2="686" y2="714"/>

      <!-- Outer nodes -->
      <circle cx="640" cy="640" r="6" fill="#FFFFFF"/>
      <circle cx="720" cy="640" r="6" fill="#FFFFFF"/>
      <circle cx="620" cy="710" r="5" fill="#FFFFFF"/>
      <circle cx="740" cy="710" r="5" fill="#FFFFFF"/>
      <circle cx="680" cy="750" r="5" fill="#FFFFFF"/>

      <!-- Outer connection lines -->
      <line x1="646" y1="643" x2="664" y2="650"/>
      <line x1="714" y1="643" x2="696" y2="650"/>
      <line x1="625" y1="708" x2="635" y2="700"/>
      <line x1="735" y1="708" x2="725" y2="700"/>
      <line x1="680" y1="745" x2="680" y2="730"/>
    </g>

    <!-- Sparkle dots -->
    <circle cx="630" cy="620" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="735" cy="625" r="2.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="610" cy="730" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="750" cy="735" r="2.5" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- Magnifying glass / search element (top-left accent) -->
  <g opacity="0.15">
    <circle cx="260" cy="260" r="60" stroke="#FFFFFF" stroke-width="8" fill="none"/>
    <line x1="302" y1="302" x2="340" y2="340" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
